<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>キッチン コース管理</title>

<style>

/*=========================================
 全体
=========================================*/

body{

    margin:5px;

    font-family:sans-serif;

    overflow-x:auto;

    background:#ffffff;

}


h3{

    margin-top:30px;

    margin-bottom:10px;

}


/*=========================================
 入力エリア
=========================================*/

.controls{

    margin-bottom:8px;

}


select,
button{

    padding:6px;

    font-size:16px;

    margin-right:3px;

}


input{

    width:73px;

    height:25px;

    font-size:17px;

    text-align:center;

}


button{

    cursor:pointer;

}


/*=========================================
 テーブル
=========================================*/

table{

    width:100%;

    border-collapse:collapse;

    background:#f4f0f0;

}


th,
td{

    border:1px solid #cccccc;

    padding:2px;

    text-align:center;

}


th{

    background:#333333;

    color:white;

}


/*=========================================
 料理セル
=========================================*/

.dish{

    width:8%;

    cursor:pointer;

    font-weight:bold;

    user-select:none;

}


.done{

    background:#666666 !important;

    color:#bbbbbb !important;

    text-decoration:line-through;

    opacity:0.6;

}


/*=========================================
 コース料理色
=========================================*/


.dish0{

    background:#ffd6d6;

}


.dish1{

    background:#fff0b3;

}


.dish2{

    background:#d6f5d6;

}


.dish3{

    background:#d6ecff;

}


.dish4{

    background:#e6d6ff;

}


.dish5{

    background:#ffd9f0;

}


.dish6{

    background:#ffe4cc;

}


.dish7{

    background:#d9fff2;

}


.dish8{

    background:#f0f0f4;

}


/*=========================================
 完了コース表示
=========================================*/

#completedBody td{

    background:#eeeeee;

}


</style>

</head>


<body>


<!-- ===============================
     入力エリア
=============================== -->


<div class="controls">


<input
type="time"
id="courseTime">


<select id="courseSelect">

</select>


<input
type="number"
id="people"
placeholder="人数"
min="1"
style="width:60px;">


<input
type="text"
id="tableNo"
placeholder="卓番">


<button onclick="addCourse()">

追加

</button>


</div>



<!-- ===============================
     注文一覧
=============================== -->


<table>

<thead>

<tr>

<th>追加</th>

<th>削除</th>

<th>時間</th>

<th>コース</th>

<th>人数</th>

<th>卓番</th>

<th>L.O.</th>

<th>料理①</th>

<th>料理②</th>

<th>料理③</th>

<th>料理④</th>

<th>料理⑤</th>

<th>料理⑥</th>

<th>料理⑦</th>

<th>料理⑧</th>

<th>料理⑨</th>

<th>追加料理</th>


</tr>

</thead>


<tbody id="courseBody">


</tbody>


</table>
<!-- ===============================
     完了コース一覧
=============================== -->


<h3>

完了コース

</h3>



<div style="overflow-x:auto;">


<table>


<thead>


<tr>


<th>

時間

</th>


<th>

コース

</th>


<th>

人数

</th>


<th>

卓番

</th>


<th>

完了時間

</th>


<th>

操作

</th>


</tr>


</thead>



<tbody id="completedBody">


</tbody>



</table>


</div>





<!-- ===============================
     ログアウト
=============================== -->


<div style="text-align:center;margin:30px 0;">


<button

onclick="logout()"

style="

padding:12px 30px;

font-size:18px;

background:#d9534f;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

">


ログアウト


</button>


</div>





<hr>





<!-- ===============================
     管理画面へ
=============================== -->


<div style="text-align:center;">



<button

onclick="location.href='admin.html'"

style="

padding:10px 20px;

font-size:16px;

">


コース管理


</button>



</div>
<!-- =======================================
 Firebaseライブラリ
======================================= -->


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>




<!-- =======================================
 Firebase設定
======================================= -->


<script src="firebase.js"></script>




<!-- =======================================
 メイン処理
======================================= -->


<script src="script.js?v=2"></script>




</body>

</html>
