<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>コース管理</title>

<style>

/*==============================
  全体
==============================*/

body{

    font-family:sans-serif;

    background:#f5f5f5;

    max-width:700px;

    margin:auto;

    padding:20px;

}

h2{

    text-align:center;

}

/*==============================
  カード
==============================*/

.card{

    background:white;

    border-radius:10px;

    padding:20px;

    box-shadow:0 2px 8px rgba(0,0,0,.15);

}

/*==============================
  ラベル
==============================*/

label{

    font-weight:bold;

}

/*==============================
  入力部品
==============================*/

select,
input,
button{

    width:100%;

    padding:10px;

    font-size:18px;

    margin-top:8px;

    margin-bottom:15px;

    box-sizing:border-box;

}

button{

    cursor:pointer;

}

/*==============================
  横並びボタン
==============================*/

.row{

    display:flex;

    gap:10px;

}

.row button{

    flex:1;

}

/*==============================
  区切り線
==============================*/

hr{

    margin:25px 0;

}

/*==============================
  料理一覧
==============================*/

#dishList div{

    display:flex;

    gap:10px;

    margin-bottom:10px;

}

#dishList input{

    flex:1;

    margin:0;

}

#dishList button{

    width:90px;

    margin:0;

}

</style>

</head>

<body>

<div class="card">

<h2>コース管理</h2>

<!--==========================
 コース選択
===========================-->

<label>コース選択</label>

<select id="courseSelect"></select>

<div class="row">

    <!-- Firestoreから読込 -->
    <button onclick="loadCourse()">
        読込
    </button>

    <!-- 新しいコース追加 -->
    <button onclick="addCourse()">
        ＋コース追加
    </button>

    <!-- Firestoreへ保存 -->
    <button onclick="saveCourse()">
        保存
    </button>

</div>

<hr>

<!--==========================
 コース時間
===========================-->

<label>コース時間（分）</label>

<input
type="number"
id="duration">

<hr>

<!--==========================
 料理一覧
===========================-->

<label>料理一覧</label>

<div id="dishList"></div>

<button onclick="addDish()">
＋料理追加
</button>
<body>

<div class="card">

    <!-- タイトル -->
    <h2>コース管理</h2>

    <!-- コース選択 -->
    <label>コース選択</label>

    <select id="courseSelect"></select>

    <!-- 読込・追加・保存 -->
    <div class="row">

        <button onclick="loadCourse()">
            読込
        </button>

        <button onclick="addCourse()">
            ＋コース追加
        </button>

        <button onclick="saveCourse()">
            保存
        </button>

    </div>

    <hr>

    <!-- コース時間 -->
    <label>コース時間（分）</label>

    <input
        type="number"
        id="duration">

    <hr>

    <!-- 料理一覧 -->
    <label>料理一覧</label>

    <div id="dishList"></div>

    <button onclick="addDish()">
        ＋料理追加
    </button>

    <hr>

    <!-- コース名変更 -->
    <button onclick="renameCourse()">
        コース名変更
    </button>

    <hr>

    <!-- コース削除 -->
    <button
        style="background:#ff6666;color:white;"
        onclick="deleteCourse()">

        コース削除

    </button>

    <br><br>

    <!-- メイン画面へ戻る -->
    <button
        onclick="location.href='index.html'">

        ← 管理画面へ戻る

    </button>

</div>
<!-- ==========================
     Firebaseライブラリ読込
========================== -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<!-- ==========================
     Firebase設定
========================== -->

<script src="firebase.js"></script>

<!-- ==========================
     コース管理JavaScript
========================== -->

<script src="admin.js"></script>

</body>
</html>
